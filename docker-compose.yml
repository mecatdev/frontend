# Frontend standalone - bisa dijalankan di repo terpisah
# Set BACKEND_URL untuk koneksi ke backend (lokal atau deployed)
# Contoh: BACKEND_URL=http://localhost:4000 atau BACKEND_URL=https://api.example.com
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:4000}
    container_name: mecat-frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:4000}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
